stages: [check, build, release]

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

cache:
  key: cargo-cache
  paths: [.cargo/, target/]

#fmt-clippy:
#  stage: check
#  image: rust:1.82
#  script:
#    - cargo fmt --check
#    - cargo clippy --all-targets -- -D warnings

#test:
#  stage: check
#  image: rust:1.82
#  script:
#    - cargo test --all

build-linux:
  stage: build
  image: rust:1.82
  script:
    - cargo build --release
  artifacts:
    paths: [target/release/your-cli]

build-windows:
  stage: build
  image: rust:1.82
  before_script:
    - rustup target add x86_64-pc-windows-gnu
    - apt-get update && apt-get install -y mingw-w64
  script:
    - cargo build --release --target x86_64-pc-windows-gnu
  artifacts:
    paths: [target/x86_64-pc-windows-gnu/release/your-cli.exe]

release:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "publish to GitLab Package Registry / release page"